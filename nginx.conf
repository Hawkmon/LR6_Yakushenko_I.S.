# Блок виртуального сервера nginx.
# nginx принимает внешний HTTP-трафик и передает его контейнеру Django.
server {
    listen 80;
    server_name localhost;

    # Блок обратного прокси для приложения авторизации.
    location / {
        # Запросы перенаправляются на сервис auth_app из docker-compose.yml.
        proxy_pass http://auth_app:8000;
        # Заголовок Host сохраняет исходное имя хоста для Django.
        proxy_set_header Host $host;
        # X-Real-IP передает приложению настоящий IP клиента для проверки доступа.
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Блок служебной статистики nginx для nginx_exporter.
    location /stub_status {
        stub_status;
        access_log off;
        # В учебной конфигурации доступ открыт всем контейнерам сети мониторинга.
        allow all;
    }
}
