<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; margin-top: 0; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 10px; text-align: center; font-weight: bold; background: #ffe6e6; padding: 5px; border-radius: 4px; }
        .footer { text-align: center; font-size: 0.8em; color: gray; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Авторизация</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="username">Логин:</label>
            <input type="text" id="username" name="username" required placeholder="admin, guest..." value="{{ request.POST.username|default:'' }}">

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required placeholder="Введите пароль">

            <button type="submit">Войти</button>
        </form>

        <div class="footer">
            Ваш IP: {{ request.META.HTTP_X_FORWARDED_FOR|default:request.META.REMOTE_ADDR }}
        </div>
    </div>
</body>
</html>
