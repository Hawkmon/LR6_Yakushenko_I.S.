services:
  nginx:
    image: nginx:alpine
    container_name: my_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth_app
    networks:
      - auth_network
    restart: unless-stopped

  auth_app:
    build: .
    container_name: my_auth_app
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - auth_network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: my_postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth_network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: my_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - auth_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: my_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - auth_app
      - nginx
      - cadvisor
      - postgres_exporter
      - nginx_exporter
    networks:
      - auth_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.3.1
    container_name: my_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - auth_network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: my_cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - auth_network
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: my_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://auth_user:auth_password@db:5432/auth_db?sslmode=disable
    depends_on:
      - db
    networks:
      - auth_network
    restart: unless-stopped

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: my_nginx_exporter
    command:
      - -nginx.scrape-uri=http://nginx:80/stub_status
    depends_on:
      - nginx
    networks:
      - auth_network
    restart: unless-stopped

networks:
  auth_network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
